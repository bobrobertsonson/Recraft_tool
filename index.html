<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    function RecraftStyleTool() {
      const [apiKey, setApiKey] = useState('');
      const [styleImages, setStyleImages] = useState([]);
      const [prompt, setPrompt] = useState('');
      const [generatedImages, setGeneratedImages] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const fileInputRef = useRef(null);

      const handleApiKeyChange = (e) => {
        setApiKey(e.target.value);
        setError('');
      };

      const handleFileSelect = (e) => {
        const files = Array.from(e.target.files);
        const newImages = files.map((file) => ({
          id: Math.random().toString(36).substr(2, 9),
          file,
          preview: URL.createObjectURL(file),
        }));
        setStyleImages([...styleImages, ...newImages]);
        setError('');
      };

      const removeStyleImage = (id) => {
        setStyleImages(styleImages.filter((img) => img.id !== id));
      };

      const generateImage = async () => {
        if (!apiKey.trim()) {
          setError('Please enter your Recraft API key');
          return;
        }
        if (styleImages.length === 0) {
          setError('Please upload at least one style reference image');
          return;
        }
        if (!prompt.trim()) {
          setError('Please enter a prompt describing what you want');
          return;
        }

        setLoading(true);
        setError('');

        try {
          const styleImageBase64s = await Promise.all(
            styleImages.map((img) => {
              return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(img.file);
              });
            })
          );

          const requestBody = {
            prompt: prompt,
            model: 'recraft-v3',
            size: '1024x1024',
            style: {
              style_id: 'any',
              images: styleImageBase64s.map((base64) => ({
                url: `data:image/png;base64,${base64}`,
              })),
            },
          };

          const response = await fetch('https://api.recraft.ai/v1/images/generations', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${apiKey}`,
            },
            body: JSON.stringify(requestBody),
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(
              errorData.error?.message || `API error: ${response.status}`
            );
          }

          const data = await response.json();
          if (data.data && data.data.length > 0) {
            setGeneratedImages([
              ...generatedImages,
              {
                id: Math.random().toString(36).substr(2, 9),
                url: data.data[0].url,
                prompt: prompt,
                timestamp: new Date().toLocaleTimeString(),
              },
            ]);
            setPrompt('');
          }
        } catch (err) {
          setError(
            `Error generating image: ${err.message}. Check your API key and try again.`
          );
        } finally {
          setLoading(false);
        }
      };

      const handleKeyPress = (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
          generateImage();
        }
      };

      return (
        <div className="tool-container">
          <div className="header">
            <div className="title">recraft style</div>
            <div className="subtitle">
              upload your illustrations. describe what you want. ai generates images in your style.
            </div>
          </div>

          <div className="content">
            <div className="section">
              <div className="section-title">setup</div>

              <div className="input-group">
                <label>API Key</label>
                <input
                  type="text"
                  value={apiKey}
                  onChange={handleApiKeyChange}
                  placeholder="Paste your Recraft API key here"
                />
                <div className="status">
                  {apiKey ? '✓ Key set' : '○ Not configured'}
                </div>
              </div>

              <div className="input-group">
                <label>Style References</label>
                <div className="file-upload">
                  <label className="file-input-label">
                    Click to upload illustrations
                    <input
                      ref={fileInputRef}
                      type="file"
                      multiple
                      accept="image/*"
                      onChange={handleFileSelect}
                    />
                  </label>
                </div>
                {styleImages.length > 0 && (
                  <div className="style-images">
                    {styleImages.map((img) => (
                      <div key={img.id} className="style-image-item">
                        <img src={img.preview} alt="style reference" />
                        <button
                          className="remove-btn"
                          onClick={() => removeStyleImage(img.id)}
                        >
                          ×
                        </button>
                      </div>
                    ))}
                  </div>
                )}
                <div className="status">
                  {styleImages.length > 0
                    ? `${styleImages.length} image${styleImages.length !== 1 ? 's' : ''} added`
                    : '○ No images'}
                </div>
              </div>
            </div>

            <div className="section">
              <div className="section-title">generate</div>

              <div className="input-group">
                <label>Prompt</label>
                <textarea
                  value={prompt}
                  onChange={(e) => setPrompt(e.target.value)}
                  onKeyPress={handleKeyPress}
                  placeholder="Describe what you want to create..."
                  disabled={loading}
                />
              </div>

              <div className="button-group">
                <button
                  className="generate-btn"
                  onClick={generateImage}
                  disabled={loading || !apiKey || styleImages.length === 0}
                >
                  {loading ? 'generating...' : 'generate'}
                </button>
              </div>

              {error && <div className="error">{error}</div>}

              <div className="status">
                {loading ? '○ Processing...' : '○ Ready'}
              </div>
            </div>

            {generatedImages.length > 0 && (
              <div className="generated-section">
                <div className="section-title">Generated Images</div>
                <div className="generated-grid">
                  {generatedImages.map((img) => (
                    <div key={img.id} className="generated-item">
                      <div className="generated-image">
                        <img src={img.url} alt="generated" />
                      </div>
                      <div className="image-meta">
                        <div className="image-prompt">{img.prompt}</div>
                        <div className="image-time">{img.timestamp}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RecraftStyleTool />);
  </script>

</body>
